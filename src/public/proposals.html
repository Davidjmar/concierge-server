<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kno — my proposals</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">kno</a>
  <div class="nav-links">
    <a href="/proposals">My proposals</a>
    <a href="/submit">Submit a find</a>
    <a href="/settings">Settings</a>
    <a href="/auth/logout" onclick="localStorage.removeItem('kno_user_id')">Sign out</a>
  </div>
</nav>

<div class="container" style="margin-top:1.5rem">

  <div id="loading" style="text-align:center;padding:3rem;color:var(--muted)">Loading…</div>

  <div id="proposals-container" style="display:none">

    <div style="margin-bottom:1.5rem">
      <h1 style="font-size:1.5rem;font-weight:800">Your proposals</h1>
      <p class="text-muted text-sm">Upcoming and past suggestions from kno. Keep or delete them on your Google Calendar.</p>
    </div>

    <!-- Upcoming / pending -->
    <div id="section-pending">
      <p style="font-size:0.8rem;font-weight:600;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;margin-bottom:0.75rem">
        Upcoming suggestions
      </p>
      <div id="list-pending"></div>
    </div>

    <hr class="divider" />

    <!-- Past -->
    <div id="section-past">
      <p style="font-size:0.8rem;font-weight:600;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;margin-bottom:0.75rem">
        Past suggestions
      </p>
      <div id="list-past"></div>
    </div>

  </div>

  <div id="empty" style="display:none">
    <div class="empty-state">
      <h2>No proposals yet</h2>
      <p>kno will start dropping suggestions on your calendar soon. Check back in a bit.</p>
    </div>
  </div>

</div>

<script>
(async () => {
  try {
    const res = await fetch('/api/proposals');
    if (res.status === 401) { window.location.href = '/'; return; }
    if (!res.ok) throw new Error('Failed to fetch proposals');
    const { proposals } = await res.json();

    document.getElementById('loading').style.display = 'none';

    if (!proposals || proposals.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    document.getElementById('proposals-container').style.display = 'block';

    const pending = proposals.filter(p => p.user_response === 'pending');
    const past = proposals.filter(p => p.user_response !== 'pending');

    const renderCard = p => {
      // Sequelize serializes belongsTo(Event) as capital-E "Event"
      const ev = p.Event ?? p.event ?? {};

      const tags = (ev.tags ?? []).slice(0, 4).map(t =>
        `<span class="proposal-tag">${t.replace(/_/g, ' ')}</span>`
      ).join('');

      const badge = p.user_response === 'kept'
        ? '<span class="badge badge-kept">Kept ✓</span>'
        : p.user_response === 'deleted'
        ? '<span class="badge badge-deleted">Passed</span>'
        : '<span class="badge badge-pending">Upcoming</span>';

      const price = ev.price
        ? ev.price.min === 0 && ev.price.max === 0
          ? '🆓 Free'
          : `💰 $${ev.price.min}–$${ev.price.max}`
        : '';

      const address = ev.location?.address ?? '';
      const dateStr = ev.datetime?.start
        ? new Date(ev.datetime.start).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
        : '';

      const venueLine = ev.venue_name ? ev.venue_name : '';

      const passBtn = p.user_response === 'pending'
        ? `<button class="pass-btn" onclick="showPassPanel(${p.id}, this)">Pass on this</button>
           <div class="pass-panel" id="pass-panel-${p.id}" style="display:none">
             <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem">Why are you passing?</p>
             <div class="chip-grid" id="pass-reasons-${p.id}">
               <span class="chip" data-val="not_my_vibe">Not my vibe</span>
               <span class="chip" data-val="too_far">Too far</span>
               <span class="chip" data-val="wrong_time">Wrong time</span>
               <span class="chip" data-val="already_going">Already going</span>
             </div>
             <input type="text" id="pass-hint-${p.id}" placeholder="What would you prefer instead? (optional)" style="margin-top:0.5rem;width:100%;box-sizing:border-box" />
             <div style="display:flex;gap:0.75rem;align-items:center;margin-top:0.6rem">
               <button class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.85rem" onclick="confirmPass(${p.id})">Pass</button>
               <button class="btn btn-secondary" style="padding:0.4rem 1rem;font-size:0.85rem" onclick="hidePassPanel(${p.id})">Cancel</button>
             </div>
           </div>`
        : '';

      return `
        <div class="proposal-card ${p.user_response}" id="proposal-${p.id}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
            <span class="proposal-title">${ev.title ?? 'Event'}</span>
            ${badge}
          </div>
          <div class="proposal-meta">
            ${dateStr ? `📅 ${dateStr}` : ''}
            ${venueLine ? ` · 🏠 ${venueLine}` : (address ? ` · 📍 ${address}` : '')}
            ${price ? ` · ${price}` : ''}
          </div>
          ${tags ? `<div class="proposal-tags">${tags}</div>` : ''}
          ${passBtn}
        </div>
      `;
    };

    document.getElementById('list-pending').innerHTML =
      pending.length ? pending.map(renderCard).join('') :
      '<p class="text-muted text-sm">No upcoming proposals right now.</p>';

    document.getElementById('list-past').innerHTML =
      past.length ? past.map(renderCard).join('') :
      '<p class="text-muted text-sm">No past proposals yet.</p>';

  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--accent)">Failed to load proposals. Please refresh.</p>';
  }
})();

function showPassPanel(id, btn) {
  btn.style.display = 'none';
  const panel = document.getElementById(`pass-panel-${id}`);
  if (panel) {
    panel.style.display = 'block';
    // Wire up reason chips (single-select)
    panel.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        panel.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.toggle('selected');
      });
    });
  }
}

function hidePassPanel(id) {
  const panel = document.getElementById(`pass-panel-${id}`);
  if (panel) panel.style.display = 'none';
  const passBtn = document.querySelector(`#proposal-${id} .pass-btn`);
  if (passBtn) passBtn.style.display = '';
}

async function confirmPass(id) {
  const panel = document.getElementById(`pass-panel-${id}`);
  const reason = panel?.querySelector('.chip.selected')?.dataset?.val ?? null;
  const hint = document.getElementById(`pass-hint-${id}`)?.value?.trim() ?? '';

  const confirmBtn = panel?.querySelector('.btn-primary');
  if (confirmBtn) { confirmBtn.textContent = 'Passing…'; confirmBtn.disabled = true; }

  try {
    const res = await fetch(`/api/proposals/${id}/pass`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason, re_search_hint: hint || null }),
    });
    if (!res.ok) throw new Error();

    const card = document.getElementById(`proposal-${id}`);
    card.classList.remove('pending');
    card.classList.add('deleted');
    card.querySelector('.badge').outerHTML = '<span class="badge badge-deleted">Passed</span>';
    // Remove the pass button + panel
    card.querySelector('.pass-btn')?.remove();
    panel?.remove();

    if (hint) {
      const note = document.createElement('p');
      note.className = 'text-sm text-muted';
      note.style.marginTop = '0.4rem';
      note.textContent = 'kno will look for something more like that.';
      card.appendChild(note);
    }
  } catch {
    if (confirmBtn) { confirmBtn.textContent = 'Pass'; confirmBtn.disabled = false; }
  }
}
</script>
</body>
</html>
